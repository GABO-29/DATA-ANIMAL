<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA ANIMAL | Pronósticos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --fondo: #0a0a0a; --card: #141414; --oro: #ffcc00; --texto: #ffffff; --gris: #888; --verde: #00ff00; --rojo: #ff4444; }
        * { box-sizing: border-box; text-align: center; } /* CENTRADO UNIVERSAL */
        
        body { 
            background: var(--fondo); 
            color: var(--texto); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
        }

        .container { max-width: 500px; width: 100%; }
        
        header { 
            margin-bottom: 30px; 
            border-bottom: 2px solid var(--oro); 
            padding-bottom: 10px; 
            width: 100%;
        }

        h1 { font-size: 2rem; letter-spacing: 3px; margin: 0; color: var(--oro); }

        select { 
            width: 100%; 
            padding: 12px; 
            background: var(--card); 
            color: var(--oro); 
            border: 1px solid var(--oro); 
            border-radius: 5px; 
            font-weight: bold; 
            margin-bottom: 20px; 
            outline: none;
            text-align-last: center; /* Centra el texto dentro del select */
        }

        /* Estilos para los botones de navegación de día */
        .nav-dias {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            width: 100%;
        }

        .btn-dia {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            font-size: 0.8rem;
        }

        #btn-hoy {
            background: var(--oro);
            color: #000;
            border: none;
        }

        #btn-manana {
            background: var(--card);
            color: var(--oro);
            border: 1px solid var(--oro);
        }

        .card { 
            background: var(--card); 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 { 
            font-size: 0.9rem; 
            color: var(--oro); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-top: 0; 
            width: 100%;
        }

        .piramide-visual { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: monospace; 
            font-size: 1.5rem; 
            color: var(--oro); 
            letter-spacing: 10px; 
            line-height: 1.6; 
            width: 100%;
        }

        /* Estilo para el Dato Destacado Principal */
        .destaque { 
            background: var(--oro); 
            color: #000; 
            padding: 30px; 
            border-radius: 12px; 
            margin-top: 20px; 
            width: 100%;
        }

        #dato-ganador { 
            font-size: 4.5rem; 
            font-weight: 900; 
            margin: 10px 0; 
            line-height: 1; 
            display: block;
        }

        /* Contenedor para las Pollas */
        #seccion-pollas { 
            margin-bottom: 20px; 
            width: 100%;
        }

        /* Ajustes para los bloques generados por JS */
        #lista-frecuentes { width: 100%; }

        @media (max-width: 480px) { 
            h1 { font-size: 1.5rem; } 
            .piramide-visual { font-size: 1.2rem; letter-spacing: 6px; } 
            #dato-ganador { font-size: 3.5rem; } 
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>DATA ANIMAL</h1>
        </header>
        
        <select id="filtro-ruleta" onchange="obtenerEstadisticas(this.value)">
            <option value="Lotto Activo">LOTTO ACTIVO</option>
            <option value="La Granjita">LA GRANJITA</option>
            <option value="Selva Plus">SELVA PLUS</option>
            <option value="Guacharo Activo">GUACHARO ACTIVO</option>
            <option value="Guacharito">GUACHARITO</option>
            <option value="Lotto Rey">LOTTO REY</option>
        </select>

        <div class="nav-dias">
            <button id="btn-hoy" class="btn-dia" onclick="cambiarDia(0)">Ver Hoy</button>
            <button id="btn-manana" class="btn-dia" onclick="cambiarDia(1)">Mañana VIP</button>
        </div>

        <section class="card">
            <h2 id="titulo-piramide">PIRÁMIDE DE HOY</h2>
            <div id="contenedor-piramide" class="piramide-visual"></div>
        </section>

        <section id="lista-frecuentes">
            </section>

        <div id="seccion-pollas"></div>

        <section class="card destaque">
            <h2 style="color: #000; border: none; margin:0; font-weight: 800;">FIJO DEL MOMENTO</h2>
            <div id="dato-ganador">---</div>
            <small style="font-weight: bold; text-transform: uppercase; font-size: 0.7rem;">Dato calculado por probabilidad de racha</small>
        </section>

        <div style="margin-top: 30px; color: var(--gris); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;">
            Análisis basado en patrones históricos y algoritmos de racha.
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
    
    <script>
        // Inicialización al cargar la página
        document.addEventListener('DOMContentLoaded', () => {
            // Genera pirámide inicial y carga datos de Lotto Activo por defecto
            if(typeof generarPiramide === "function") generarPiramide();
            if(typeof obtenerEstadisticas === "function") obtenerEstadisticas("Lotto Activo");
        });

        // Función para actualizar el título de la pirámide visualmente
        function actualizarTituloPiramide(offset) {
            const titulo = document.getElementById('titulo-piramide');
            if(titulo) {
                titulo.innerText = offset === 1 ? "PIRÁMIDE DE MAÑANA VIP" : "PIRÁMIDE DE HOY";
            }
        }
        
        // Sobreescribimos ligeramente cambiarDia para que actualice el texto local
        const originalCambiarDia = window.cambiarDia;
        window.cambiarDia = function(offset) {
            actualizarTituloPiramide(offset);
            if(typeof originalCambiarDia === "function") originalCambiarDia(offset);
        };
    </script>
</body>
</html>
