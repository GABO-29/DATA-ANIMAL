<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA ANIMAL | Pronósticos VIP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --fondo: #0a0a0a; 
            --card: #141414; 
            --oro: #ffcc00; 
            --texto: #ffffff; 
            --gris: #888; 
            --verde: #00ff00; 
            --rojo: #ff4444; 
        }

        * { box-sizing: border-box; text-align: center; }
        
        body { 
            background: var(--fondo); 
            color: var(--texto); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
        }

        .container { max-width: 500px; width: 100%; }
        
        header { 
            margin-bottom: 30px; 
            border-bottom: 2px solid var(--oro); 
            padding-bottom: 10px; 
            width: 100%;
        }

        h1 { 
            font-size: 2rem; 
            letter-spacing: 3px; 
            margin: 0; 
            color: var(--oro); 
            text-transform: uppercase;
            font-weight: 900;
        }

        select { 
            width: 100%; 
            padding: 15px; 
            background: var(--card); 
            color: var(--oro); 
            border: 1px solid var(--oro); 
            border-radius: 8px; 
            font-weight: bold; 
            margin-bottom: 20px; 
            outline: none;
            text-align-last: center;
            font-size: 1rem;
            appearance: none;
        }

        .nav-dias {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            width: 100%;
        }

        .btn-dia {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        #btn-hoy {
            background: var(--oro);
            color: #000;
            border: none;
        }

        #btn-manana {
            background: var(--card);
            color: var(--oro);
            border: 1px solid var(--oro);
        }

        .card { 
            background: var(--card); 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #222;
        }

        h2 { 
            font-size: 0.9rem; 
            color: var(--oro); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-top: 0; 
            width: 100%;
            font-weight: 800;
        }

        .piramide-visual { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: 'Courier New', monospace; 
            font-size: 1.6rem; 
            color: var(--oro); 
            letter-spacing: 12px; 
            line-height: 1.7; 
            width: 100%;
            font-weight: bold;
        }

        .destaque { 
            background: linear-gradient(145deg, var(--oro), #d4aa00); 
            color: #000; 
            padding: 35px 20px; 
            border-radius: 12px; 
            margin-top: 10px; 
            width: 100%;
            border: none;
        }

        .destaque h2 {
            color: #000;
            border: none;
        }

        #dato-ganador { 
            font-size: 5rem; 
            font-weight: 950; 
            margin: 10px 0; 
            line-height: 1; 
            display: block;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.2);
        }

        #seccion-pollas { width: 100%; }
        #lista-frecuentes { width: 100%; }

        @media (max-width: 480px) { 
            h1 { font-size: 1.6rem; } 
            .piramide-visual { font-size: 1.3rem; letter-spacing: 8px; } 
            #dato-ganador { font-size: 4rem; } 
            body { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>DATA ANIMAL</h1>
        </header>
        
        <select id="filtro-ruleta" onchange="obtenerEstadisticas(this.value)">
            <option value="Lotto Activo">LOTTO ACTIVO</option>
            <option value="La Granjita">LA GRANJITA</option>
            <option value="Selva Plus">SELVA PLUS</option>
            <option value="Guacharo Activo">GUACHARO ACTIVO</option>
            <option value="Guacharito">GUACHARITO</option>
            <option value="Lotto Rey">LOTTO REY</option>
        </select>

        <div class="nav-dias">
            <button id="btn-hoy" class="btn-dia" onclick="cambiarDia(0)">PRONÓSTICO HOY</button>
            <button id="btn-manana" class="btn-dia" onclick="cambiarDia(1)">MAÑANA VIP</button>
        </div>

        <section class="card">
            <h2 id="titulo-piramide">PIRÁMIDE DE HOY</h2>
            <div id="contenedor-piramide" class="piramide-visual"></div>
        </section>

        <section id="lista-frecuentes"></section>

        <div id="seccion-pollas"></div>

        <section class="card destaque">
            <h2 style="font-weight: 900; margin-bottom: 5px;">FIJO DEL MOMENTO</h2>
            <div id="dato-ganador">---</div>
            <div style="font-weight: 900; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px;">
                ALTA PROBABILIDAD DE RACHA
            </div>
        </section>

        <div style="margin-top: 30px; color: var(--gris); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; padding-bottom: 40px;">
            Análisis de Sincronía Global: Lotto Activo | La Granjita | Selva Plus<br>
            <span style="color: var(--oro); font-weight: bold;">© 2026 DATA ANIMAL - ALTO FLUJO</span>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
    
    <script>
        // Función para actualizar la UI local al cambiar de día
        function actualizarTituloPiramide(offset) {
            const titulo = document.getElementById('titulo-piramide');
            if(titulo) {
                titulo.innerText = offset === 1 ? "PIRÁMIDE DE MAÑANA VIP" : "PIRÁMIDE DE HOY";
            }
            
            // Mostrar mensaje de carga breve en la sección de pollas mientras el app.js procesa
            const pollasCont = document.getElementById('seccion-pollas');
            if(pollasCont) {
                pollasCont.innerHTML = '<div style="color:#ffcc00; font-size:0.7rem; padding:20px;">VERIFICANDO SORTEOS...</div>';
            }
        }
        
        // Sobrescribimos/Envolvemos la función cambiarDia que viene de app.js
        const funcionOriginalCambiarDia = window.cambiarDia;
        window.cambiarDia = function(offset) {
            actualizarTituloPiramide(offset);
            if(typeof funcionOriginalCambiarDia === "function") {
                funcionOriginalCambiarDia(offset);
            }
        };

        // Inicialización al cargar la página
        document.addEventListener('DOMContentLoaded', () => {
            if(typeof generarPiramide === "function") generarPiramide();
            if(typeof obtenerEstadisticas === "function") {
                const ruletaInicial = document.getElementById('filtro-ruleta').value;
                obtenerEstadisticas(ruletaInicial);
            }
        });
    </script>
</body>
</html>
