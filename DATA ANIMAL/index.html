<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA ANIMAL | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header><h1>DATA ANIMAL</h1></header>
        
        <select id="filtro-ruleta" onchange="obtenerEstadisticas(this.value)">
            <option value="Lotto Activo">LOTTO ACTIVO</option>
            <option value="La Granjita">LA GRANJITA</option>
            <option value="Selva Plus">SELVA PLUS</option>
            <option value="Guacharo Activo">GUACHARO ACTIVO</option>
            <option value="Guacharito">GUACHARITO</option>
            <option value="Lotto Rey">LOTTO REY</option>
        </select>

        <section class="card">
            <h2>PIRÁMIDE DEL DÍA</h2>
            <div id="contenedor-piramide" class="piramide-visual"></div>
        </section>

        <section class="card">
            <h2>INTELIGENCIA</h2>
            <div id="panel-inteligencia">Cargando análisis...</div>
            <div id="lista-frecuentes" style="margin-top:20px;"></div>
        </section>
    </div>
    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
