<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | DATA ANIMAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --fondo: #0a0a0a; --oro: #ffcc00; --texto: #fff; --card: #141414; }
        body { background: var(--fondo); color: var(--texto); font-family: sans-serif; padding: 20px; margin: 0; }
        .admin-card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #333; max-width: 1100px; margin: auto; }
        .header-admin { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 25px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 200px; }
        label { font-size: 0.75rem; color: var(--oro); font-weight: bold; text-transform: uppercase; }
        input[type="date"], select { padding: 12px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; outline: none; }
        .scroll { overflow-x: auto; border: 1px solid #222; border-radius: 10px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { border: 1px solid #222; padding: 10px; text-align: center; }
        th { background: #1a1a1a; color: var(--oro); font-size: 0.7rem; }
        .cell { width: 100%; background: transparent; border: none; color: #fff; text-align: center; text-transform: uppercase; font-weight: bold; }
        .btn-save { width: 100%; padding: 20px; background: var(--oro); border: none; color: #000; font-weight: 900; cursor: pointer; border-radius: 10px; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="admin-card">
        <h1 style="text-align:center; color:var(--oro);">CARGA DE RESULTADOS</h1>
        <div class="header-admin">
            <div class="input-group">
                <label>Lunes de la Semana</label>
                <input type="date" id="fecha-lunes">
            </div>
            <div class="input-group">
                <label>Seleccionar Ruleta</label>
                <select id="ruleta-admin">
                    <option value="Lotto Activo">LOTTO ACTIVO</option>
                    <option value="La Granjita">LA GRANJITA</option>
                    <option value="Selva Plus">SELVA PLUS</option>
                    <option value="Guacharo Activo">GUACHARO ACTIVO</option>
                    <option value="Guacharito">GUACHARITO</option>
                    <option value="Lotto Rey">LOTTO REY</option>
                </select>
            </div>
        </div>
        <div class="scroll">
            <table>
                <thead>
                    <tr><th>HORA</th><th>LUN</th><th>MAR</th><th>MIE</th><th>JUE</th><th>VIE</th><th>SAB</th><th>DOM</th></tr>
                </thead>
                <tbody id="tabla-body"></tbody>
            </table>
        </div>
        <button class="btn-save" onclick="enviarDatos()">Guardar Resultados</button>
    </div>
    <script src="supabase-config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
